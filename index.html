<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECC 外師教案系統 — 耶加語言學校</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F7F8FA;color:#1A1A1A;font-size:15px}
  a{color:#1A6FA8;text-decoration:none}
  a:hover{text-decoration:underline}

  /* Layout */
  .app{max-width:760px;margin:0 auto;padding:0 16px 48px}
  .header{padding:20px 0 0;border-bottom:1px solid #E0E0E0;margin-bottom:0}
  .header-top{display:flex;align-items:baseline;gap:10px;margin-bottom:16px}
  .school-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.08em}
  .app-title{font-size:20px;font-weight:600;color:#111}
  .tabbar{display:flex;gap:0;flex-wrap:wrap}
  .tab{padding:10px 14px;font-size:13px;font-weight:500;background:transparent;border:none;border-bottom:2px solid transparent;color:#888;cursor:pointer;display:flex;align-items:center;gap:4px;transition:color .15s}
  .tab:hover{color:#444}
  .tab.active{color:#111;border-bottom-color:#111}
  .tab i{font-size:14px}
  .body{padding-top:24px}

  /* Cards */
  .card{background:#fff;border:1px solid #E8E8E8;border-radius:12px;padding:16px 20px;margin-bottom:12px}
  .card-sm{padding:12px 16px}

  /* Badges */
  .badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px}
  .badge-blue{background:#E8F0FE;color:#1A6FA8}
  .badge-green{background:#E6F4EA;color:#1E7E34}
  .badge-orange{background:#FEF3E2;color:#C67C00}
  .badge-gray{background:#F1F3F4;color:#555}

  /* Form elements */
  label{font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:4px;margin-top:12px}
  input,select,textarea{width:100%;padding:8px 10px;border:1px solid #DDD;border-radius:8px;font-size:14px;font-family:inherit;background:#fff;color:#111;outline:none;transition:border .15s}
  input:focus,select:focus,textarea:focus{border-color:#1A6FA8}
  textarea{resize:vertical}
  button{padding:8px 16px;border:1px solid #DDD;border-radius:8px;background:#fff;font-size:13px;font-weight:500;cursor:pointer;color:#111;transition:background .15s}
  button:hover{background:#F5F5F5}
  button.primary{background:#111;color:#fff;border-color:#111}
  button.primary:hover{background:#333}
  button.danger{background:#fff;color:#C62828;border-color:#FFCDD2}
  button.danger:hover{background:#FFEBEE}
  button.danger-filled{background:#C62828;color:#fff;border-color:#C62828}
  button.danger-filled:hover{background:#B71C1C}
  button:disabled{opacity:.4;cursor:not-allowed}

  /* Divider */
  .divider{border-top:1px solid #EEE;margin:20px 0}

  /* Today & Weekly Picker */
  .today-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px}
  .today-date-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
  .today-date{font-size:26px;font-weight:600}
  .day-picker{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
  .day-btn{padding:7px 14px;border:1px solid #E0E0E0;border-radius:8px;background:#fff;font-size:12px;cursor:pointer;color:#555;transition:all .15s;text-align:center;min-width:64px;line-height:1.4}
  .day-btn:hover{border-color:#999;color:#111}
  .day-btn.active{background:#111;color:#fff;border-color:#111}
  .day-btn.is-today{border-color:#1A6FA8;color:#1A6FA8}
  .day-btn.is-today.active{background:#1A6FA8;border-color:#1A6FA8;color:#fff}
  .day-btn .dn{font-weight:700;display:block}
  .day-btn .dd{opacity:.7;display:block}

  .lesson-content{background:#F7F8FA;border-radius:8px;padding:12px 14px;margin-top:10px}
  .lesson-content-label{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
  .lesson-text{font-size:15px;line-height:1.65;white-space:pre-wrap}
  .material-link{display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:13px;color:#1A6FA8}
  .warn-box{background:#FFF8E1;border-radius:8px;padding:10px 14px;margin-top:10px;font-size:13px;color:#B45309}
  .course-header{display:flex;justify-content:space-between;align-items:flex-start}
  .course-name{font-size:20px;font-weight:600;margin-bottom:4px}
  .course-meta{font-size:13px;color:#777}
  .ct-label{font-size:11px;color:#888;margin-bottom:2px}
  .ct-name{font-size:14px;font-weight:600;text-align:right}
  .empty-state{text-align:center;padding:48px 16px;color:#999}
  .empty-state .icon{font-size:40px;margin-bottom:12px}
  .empty-state p{font-size:14px}

  /* Teacher view */
  .save-indicator{font-size:11px;color:#1E7E34;margin-left:8px}
  .img-upload-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1px dashed #CCC;border-radius:8px;background:#FAFAFA;font-size:13px;cursor:pointer;color:#555;transition:all .15s}
  .img-upload-btn:hover{border-color:#1A6FA8;color:#1A6FA8;background:#F0F7FF}
  .img-preview{margin-top:8px;border-radius:8px;border:1px solid #EEE;max-width:100%;display:block}
  .img-uploading{font-size:12px;color:#888;margin-top:6px}

  /* Admin */
  .course-row{display:flex;align-items:center;gap:10px}
  .course-row-info{flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .course-row-name{font-weight:600;font-size:14px}
  .course-row-meta{font-size:12px;color:#777}
  .mono{font-family:'SF Mono',Menlo,monospace;font-size:12px;background:#F7F8FA;padding:10px 14px;border-radius:8px;color:#555;line-height:1.8;margin-bottom:10px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .row{display:flex;gap:8px;align-items:center}
  section h3{font-size:15px;font-weight:600;margin-bottom:4px}
  section p.sub{font-size:13px;color:#777;margin-bottom:10px}

  /* Loading */
  #loading{text-align:center;padding:48px;color:#999;font-size:14px}
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
</head>
<body>

<div class="app" id="app-container">
  <div class="header">
    <div class="header-top">
      <span class="school-label">耶加語言學校</span>
      <span class="app-title">ECC 外師教案系統</span>
    </div>
    <div class="tabbar">
      <button id="tab-btn-today" class="tab active" onclick="switchTab('today',this)">
        <i class="ti ti-calendar"></i>今日課表
      </button>
      <button id="tab-btn-weekly" class="tab" onclick="switchTab('weekly',this)">
        <i class="ti ti-photo"></i>當週課表
      </button>
      <button id="tab-btn-teacher" class="tab" onclick="switchTab('teacher',this)">
        <i class="ti ti-edit"></i>老師填寫
      </button>
      <button id="tab-btn-admin" class="tab" onclick="switchTab('admin',this)">
        <i class="ti ti-settings"></i>行政管理
      </button>
    </div>
  </div>

  <div class="body">
    <div id="loading">載入中...</div>
    <div id="tab-today" style="display:none"></div>
    <div id="tab-weekly" style="display:none"></div>
    <div id="tab-teacher" style="display:none"></div>
    <div id="tab-admin" style="display:none"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── Firebase config ──────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBc14tI-IAmSGRUkBIvuO9Cze8mQFare7M",
  authDomain: "aplusecc.firebaseapp.com",
  databaseURL: "https://aplusecc-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "aplusecc",
  storageBucket: "aplusecc.firebasestorage.app",
  messagingSenderId: "1098832467671",
  appId: "1:1098832467671:web:958f9db44977b6e4904292",
  measurementId: "G-HBGHH7K7MF"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── Helpers ──────────────────────────────────────────────────────────────────
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const IMGBB_KEY = 'bf4527c3aa6bd9f9d777c72d26268251';
let courses = {};
let weeklySchedules = {}; 
let selectedDate = todayISO();
let activeTab = 'today';
let activeWeeklyWeek = ''; 

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function toISO(raw) {
  const s = (raw||'').trim();
  if (!s) return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const p = s.split('/');
  if (p.length >= 2) {
    const y = p.length === 3 ? p[2] : new Date().getFullYear();
    return `${y}-${String(p[0]).padStart(2,'0')}-${String(p[1]).padStart(2,'0')}`;
  }
  return s;
}
function fmtDate(iso) {
  if (!iso) return '─';
  const dt = new Date(iso + 'T12:00:00');
  return `${dt.getMonth()+1}/${dt.getDate()} (${DAYS[dt.getDay()]})`;
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function courseList() {
  return Object.values(courses || {});
}

function parseTimeToMinutes(timeStr) {
  const clean = (timeStr || '').trim();
  const match = clean.match(/^(\d+):(\d+)/);
  if (!match) return 0;
  return parseInt(match[1], 10) * 60 + parseInt(match[2], 10);
}

function sortCoursesByTime(a, b) {
  return parseTimeToMinutes(a.time) - parseTimeToMinutes(b.time);
}

// ── Firebase read/write ───────────────────────────────────────────────────────
async function saveCourse(id, data) {
  await set(ref(db, `courses/${id}`), data);
}
async function deleteCourse(id) {
  await set(ref(db, `courses/${id}`), null);
  delete courses[id];
}
async function saveWeeklySchedule(weekName, imageUrl) {
  await set(ref(db, `weeklySchedules/${weekName}`), imageUrl);
}
async function deleteWeeklySchedule(weekName) {
  await set(ref(db, `weeklySchedules/${weekName}`), null);
  delete weeklySchedules[weekName];
}

// Listen for real-time updates
onValue(ref(db, 'courses'), snap => {
  courses = snap.val() || {};
  rerenderActive();
});
onValue(ref(db, 'weeklySchedules'), snap => {
  const val = snap.val();
  // 強固性：確保拿到的是乾淨的 Object，不被舊資料字串影響
  if (val && typeof val === 'object') {
    weeklySchedules = val;
  } else {
    weeklySchedules = {};
  }
  if (activeTab === 'weekly') renderWeekly();
});

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  if (btn) {
    btn.classList.add('active');
  } else {
    document.getElementById('tab-btn-' + name)?.classList.add('active');
  }
  
  ['today', 'weekly', 'teacher', 'admin'].forEach(t => {
    const el = document.getElementById('tab-' + t);
    if (el) el.style.display = (t === name) ? 'block' : 'none';
  });
  
  activeTab = name;

  if (name === 'today') renderToday();
  if (name === 'weekly') renderWeekly();
  if (name === 'teacher') renderTeacher();
  if (name === 'admin') renderAdmin();
}

function rerenderActive() {
  if (activeTab === 'today') renderTodayContent();
  if (activeTab === 'teacher') renderTeacherCourses();
  if (activeTab === 'admin') renderAdminContent();
}

// ── 1. TODAY VIEW (今日課表) ──────────────────────────────────────────────────
function renderToday() {
  renderTodayContent();
}

function getAvailableDates() {
  const list = courseList();
  if (!list.length) return [];
  const uniqueDates = [...new Set(list.map(c => c.date).filter(Boolean))].sort();
  return uniqueDates.map(iso => {
    const dt = new Date(iso + 'T12:00:00');
    return {
      iso,
      dayName: DAYS[dt.getDay()],
      dayNum: (dt.getMonth()+1) + '/' + dt.getDate()
    };
  });
}

function renderTodayContent() {
  const today = todayISO();
  const availableDates = getAvailableDates();
  
  if (!availableDates.length) {
    let html = `
      <div class="today-header">
        <div>
          <div class="today-date-label">Today</div>
          <div class="today-date">${fmtDate(today)}</div>
        </div>
        <span class="badge badge-blue">0 堂課</span>
      </div>
      <div class="empty-state"><div class="icon">📅</div><p>目前沒有任何排定的外師課程</p></div>`;
    document.getElementById('tab-today').innerHTML = html;
    return;
  }

  if (!availableDates.find(d => d.iso === selectedDate)) {
    const hasToday = availableDates.find(d => d.iso === today);
    selectedDate = hasToday ? today : availableDates[0].iso;
  }

  let pickerHtml = '<div class="day-picker">';
  availableDates.forEach(d => {
    const isToday = d.iso === today;
    const isActive = d.iso === selectedDate;
    const cls = ['day-btn', isToday ? 'is-today' : '', isActive ? 'active' : ''].filter(Boolean).join(' ');
    pickerHtml += `<button class="${cls}" onclick="selectDay('${d.iso}')"><span class="dn">${d.dayName}</span><span class="dd">${d.dayNum}</span></button>`;
  });
  pickerHtml += '</div>';

  const list = courseList().filter(c => c.date === selectedDate).sort(sortCoursesByTime);
  const isToday = selectedDate === today;
  const label = isToday ? 'Today' : fmtDate(selectedDate);

  let html = `
    <div class="today-header">
      <div>
        <div class="today-date-label">${isToday ? 'Today' : 'Schedule'}</div>
        <div class="today-date">${label}</div>
      </div>
      <span class="badge badge-blue">${list.length} 堂課</span>
    </div>
    ${pickerHtml}`;

  if (!list.length) {
    html += `<div class="empty-state"><div class="icon">📅</div><p>這天沒有排定的外師課程</p></div>`;
  } else {
    list.forEach(c => {
      html += `<div class="card">
        <div class="course-header">
          <div>
            <div class="course-name">${esc(c.className)}</div>
            <div class="course-meta" style="margin-top: 4px;">
              <i class="ti ti-clock" style="font-size:12px;vertical-align:-1px;margin-right:3px"></i>${esc(c.time)}
              &nbsp;&nbsp;
              <i class="ti ti-door" style="font-size:12px;vertical-align:-1px;margin-right:3px"></i>Rm ${esc(c.classroom)}
              ${c.textbook ? `&nbsp;&nbsp;<i class="ti ti-book" style="font-size:12px;vertical-align:-1px;margin-right:3px;color:#1A6FA8"></i><span style="font-weight:600;color:#1A6FA8">${esc(c.textbook)}</span>` : ''}
            </div>
          </div>
          <div>
            <div class="ct-label">C.T.</div>
            <div class="ct-name">${esc(c.teacher||'─')}</div>
          </div>
        </div>`;
      if (c.lesson) {
        html += `<div class="lesson-content">
          <div class="lesson-content-label">Today's Lesson</div>
          <div class="lesson-text">${esc(c.lesson)}</div>
          ${c.materialLink ? `<a href="${esc(c.materialLink)}" target="_blank" class="material-link">
            <i class="ti ti-external-link" style="font-size:14px"></i>
            教材連結${c.materialPage ? ' — p.' + esc(c.materialPage) : ''}
          </a>` : ''}
          ${(c.imageUrls && c.imageUrls.length) ? c.imageUrls.map(u => `<img src="${esc(u)}" style="margin-top:8px;max-width:100%;border-radius:8px;border:1px solid #EEE;display:block">`).join('') : (c.imageUrl ? `<img src="${esc(c.imageUrl)}" style="margin-top:8px;max-width:100%;border-radius:8px;border:1px solid #EEE;display:block">` : '')}
        </div>`;
      } else {
        html += `<div class="warn-box">
          <i class="ti ti-alert-triangle" style="font-size:13px;margin-right:5px;vertical-align:-2px"></i>
          Lesson not yet filled in — please check with your C.T.
        </div>`;
      }
      html += `</div>`;
    });
  }
  document.getElementById('tab-today').innerHTML = html;
}

function selectDay(iso) {
  selectedDate = iso;
  renderTodayContent();
}

// ── 2. WEEKLY VIEW (當週課表 - 多週圖檔) ───────────────────────────────────────
function renderWeekly() {
  const weeks = Object.keys(weeklySchedules || {}).filter(w => typeof weeklySchedules[w] === 'string').sort();
  
  if (!weeks.length) {
    let emptyHtml = `
      <div class="today-header" style="margin-bottom: 8px;">
        <div>
          <div class="today-date-label">Weekly Schedule</div>
          <div class="today-date" style="font-size: 22px;">當週課表圖檔展示</div>
        </div>
      </div>
      <div class="empty-state" style="background:#fff; border-radius:12px; border:1px solid #E8E8E8;">
        <div class="icon">🖼️</div>
        <p>目前尚未上傳任何週度的課表圖檔</p>
      </div>
      ${renderWeeklyUploadSection()}`;
    document.getElementById('tab-weekly').innerHTML = emptyHtml;
    initWeeklyUploadListener();
    return;
  }

  if (!activeWeeklyWeek || !weeklySchedules[activeWeeklyWeek]) {
    activeWeeklyWeek = weeks[weeks.length - 1];
  }

  let pickerHtml = '<div class="day-picker" style="margin-bottom:16px;">';
  weeks.forEach(w => {
    const isActive = w === activeWeeklyWeek;
    const cls = ['day-btn', isActive ? 'active' : ''].filter(Boolean).join(' ');
    pickerHtml += `<button class="${cls}" style="min-width:90px;" onclick="selectWeeklyWeek('${esc(w)}')">
      <span class="dn" style="font-size:12px;">${esc(w)}</span>
    </button>`;
  });
  pickerHtml += '</div>';

  const currentImgUrl = weeklySchedules[activeWeeklyWeek];
  let imgHtml = `
    <div style="position:relative;">
      <img src="${esc(currentImgUrl)}" style="width:100%; border-radius:12px; border:1px solid #E8E8E8; display:block;">
      <button onclick="doDeleteWeeklySchedule('${esc(activeWeeklyWeek)}')" class="danger" style="position:absolute; top:12px; right:12px; padding:6px 12px; font-size:11px; font-weight:600; box-shadow:0 2px 8px rgba(0,0,0,0.15); background:#fff;">
        🗑️ 刪除此週圖檔
      </button>
    </div>`;

  document.getElementById('tab-weekly').innerHTML = `
    <div class="today-header" style="margin-bottom: 8px;">
      <div>
        <div class="today-date-label">Weekly Schedule</div>
        <div class="today-date" style="font-size: 22px;">當週課表圖檔展示</div>
      </div>
      <span class="badge badge-blue">${weeks.length} 週課表</span>
    </div>
    ${pickerHtml}
    ${imgHtml}
    ${renderWeeklyUploadSection()}`;

  initWeeklyUploadListener();
}

function renderWeeklyUploadSection() {
  return `
    <div class="card" style="margin-top: 24px; border-style: dashed;">
      <h3 style="font-size:14px; margin-bottom:8px;">新增 / 更新週度課表圖檔</h3>
      <div class="grid2" style="margin-bottom:10px; grid-template-columns: 1fr;">
        <div>
          <label style="margin-top:0;">1. 輸入週度名稱 (若留空，系統會自動填寫當日日期)</label>
          <input type="text" id="schedule-week-name" placeholder="例如：7/20~7/24" style="padding:10px 12px; font-size:14px; margin-bottom: 12px;">
        </div>
        <div>
          <label style="margin-top:0;">2. 點擊按鈕選取並上傳圖片</label>
          <button type="button" class="primary" onclick="triggerScheduleUpload()" style="width:100%; padding:12px; font-size:14px; display:flex; align-items:center; justify-content:center; gap:8px;">
            <i class="ti ti-photo-up" style="font-size:18px"></i>選擇手機照片 / 電腦圖檔上傳
          </button>
          <input type="file" accept="image/*" id="schedule-img-input" style="display:none;">
        </div>
      </div>
      <span id="schedule-upload-status" style="font-size:13px; color:#1A6FA8; font-weight:500; display:block; margin-top:8px; text-align:center;"></span>
    </div>`;
}

// JS 手動觸發檔案選擇，相容所有瀏覽器
window.triggerScheduleUpload = function() {
  document.getElementById('schedule-img-input').click();
};

function initWeeklyUploadListener() {
  const input = document.getElementById('schedule-img-input');
  if (!input) return;
  
  // 移除舊監聽，避免重複綁定
  input.removeAttribute('onchange'); 
  input.onchange = async function(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    const weekNameIn = document.getElementById('schedule-week-name');
    let weekName = (weekNameIn ? weekNameIn.value : '').trim();
    
    // 如果留空，自動抓今天日期當名稱
    if (!weekName) {
      const today = new Date();
      weekName = `${today.getMonth()+1}/${today.getDate()} 課表`;
    }

    const status = document.getElementById('schedule-upload-status');
    if (status) status.innerHTML = `<span style="color:#C67C00;">⏳ 「${weekName}」課表圖檔正在上傳中，請稍候...</span>`;
    
    try {
      const url = await uploadImage(file);
      await saveWeeklySchedule(weekName, url);
      if (status) status.innerHTML = `<span style="color:#1E7E34;">✓ 「${weekName}」課表上傳成功！</span>`;
      activeWeeklyWeek = weekName; 
      setTimeout(() => {
        renderWeekly();
      }, 1000);
    } catch(err) {
      if (status) status.innerHTML = `<span style="color:#C62828;">❌ 上傳失敗，請確認網路並重新再試一次</span>`;
    }
  };
}

          <label style="margin-top:0;">1. 負責導師 (Teacher)</label>

        </div>

          <label style="margin-top:0;">2. 使用教材課本 (Textbook)</label>
          <input type="text" value="${esc(c.textbook||'')}" placeholder="e.g. Side by Side 1" onblur="saveField('${c.id}','textbook',this.value)">

      <textarea id="tl-${c.id}" rows="2" placeholder="e.g. Ch2 p.14-16 — Vocabulary practice" onblur="saveField('${c.id}','lesson',this.value)">${esc(c.lesson||'')}</textarea>

          <label>頁數備註</label>

        <button type="button" class="img-upload-btn" onclick="triggerScreenshotUpload('${c.id}')" style="width:auto; min-width:120px; display:inline-flex; align-items:center; justify-content:center; gap:6px;">
          <i class="ti ti-photo-up" style="font-size:15px"></i>上傳截圖

window.triggerScreenshotUpload = function(cid) {
  document.getElementById(`screenshot-input-${cid}`).click();
};

async function saveField(id, field, val) {
  const course = courses[id];
  if (!course) return;
  course[field] = val;
  course.updatedAt = new Date().toISOString();
  await saveCourse(id, course);
  const si = document.getElementById('si-' + id);
  const tb = document.getElementById('tb-' + id);
  if (si) { si.style.display = 'inline'; setTimeout(() => si.style.display = 'none', 2000); }
  if (tb) {
    const lesson = field === 'lesson' ? val : course.lesson;
    tb.className = `badge ${lesson ? 'badge-green' : 'badge-orange'}`;
    tb.textContent = lesson ? '完成' : '待填';
  }
}

async function uploadImage(file) {
  const base64 = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
  const form = new FormData();
  form.append('key', IMGBB_KEY);
  form.append('image', base64);
  const res = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: form });
  const data = await res.json();
  if (data.success) return data.data.url;
  throw new Error('Upload failed');
}

// Event delegation for teacher screenshot upload
document.addEventListener('change', async function(e) {
  if (!e.target.classList.contains('ecc-img-input')) return;
  const id = e.target.dataset.cid;
  const file = e.target.files[0];
  if (!file) return;
  const status = document.getElementById('img-status-' + id);
  if (status) { status.textContent = '⏳ 正在上傳中...'; status.style.color = '#888'; }
  try {
    const url = await uploadImage(file);
    const course = courses[id];
    if (!course) return;
    if (!course.imageUrls) course.imageUrls = [];
    course.imageUrls.push(url);
    course.updatedAt = new Date().toISOString();
    await saveCourse(id, course);
    renderImageList(id, course.imageUrls);
    if (status) { status.textContent = '✓ 上傳成功'; status.style.color = '#1E7E34'; setTimeout(() => { if(status) status.textContent = ''; }, 2000); }
    e.target.value = '';
  } catch(err) {
    if (status) { status.textContent = '❌ 上傳失敗，請重試'; status.style.color = '#C62828'; }
  }
});

function renderImageList(id, urls) {
  const container = document.getElementById('img-list-' + id);
  if (!container) return;
  if (!urls || !urls.length) { container.innerHTML = ''; return; }
  container.innerHTML = urls.map((url, i) => `
    <div style="position:relative;display:inline-block;margin:4px 6px 4px 0">
      <img src="${url}" style="width:120px;height:80px;object-fit:cover;border-radius:6px;border:1px solid #EEE;display:block">
      <button onclick="deleteImage('${id}',${i})" style="position:absolute;top:2px;right:2px;padding:2px 5px;font-size:10px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:4px;cursor:pointer">✕</button>
    </div>`).join('');
}

async function deleteImage(id, index) {
  const course = courses[id];
  if (!course || !course.imageUrls) return;
  course.imageUrls.splice(index, 1);
  course.updatedAt = new Date().toISOString();
  await saveCourse(id, course);
  renderImageList(id, course.imageUrls);
}

function renderCourseList() {
  const filter = (document.getElementById('search')?.value || '').toLowerCase();
  const list = courseList()
    .filter(c => !filter || [c.date, c.className, c.teacher, c.classroom, c.textbook].some(v => (v||'').toLowerCase().includes(filter)))
    .sort((a,b) => a.date === b.date ? sortCoursesByTime(a, b) : a.date.localeCompare(b.date));
  const el = document.getElementById('course-list');
  const cnt = document.getElementById('course-count');
  if (cnt) cnt.textContent = `(${courseList().length})`;
  if (!el) return;
  if (!list.length) { el.innerHTML = `<p style="color:#999;font-size:14px;text-align:center;padding:16px">找不到課程</p>`; return; }
  el.innerHTML = list.map(c => `
    <div class="card card-sm course-row">
      <div class="course-row-info">
        <span class="course-row-name">${esc(c.className)}</span>
        <span class="course-row-meta" style="margin-left:8px">${fmtDate(c.date)} · ${esc(c.time)} · Rm ${esc(c.classroom)}${c.textbook ? ' ['+esc(c.textbook)+']' : ''}${c.teacher ? ' · ' + esc(c.teacher) : ''}</span>
      </div>
      <span class="badge ${c.lesson ? 'badge-green' : 'badge-orange'}">${c.lesson ? '已填' : '未填'}</span>
      <button class="danger" onclick="doDelete('${c.id}')" aria-label="刪除" style="padding:4px 8px">
        <i class="ti ti-trash" style="font-size:14px"></i>
      </button>
    </div>`).join('');
}

async function doImport() {
  const lines = document.getElementById('paste-area').value.trim().split('\n').filter(Boolean);
  let added = 0, skipped = 0;
  for (const line of lines) {
    const parts = line.split('\t').map(s => s.trim());
    const [rawDate, className, time, classroom, teacher = ''] = [...parts, ...Array(5).fill('')];
    const date = toISO(rawDate);
    if (!date || !className) { skipped++; continue; }
    if (courseList().find(c => c.date === date && c.className === className)) { skipped++; continue; }
    const id = uid();
    const course = { 
      id, date, className, 
      time: time||'', 
      classroom: classroom||'', 
      textbook: '',
      teacher: teacher, 
      lesson: '', materialLink: '', materialPage: '', imageUrls: [], 
      createdAt: new Date().toISOString() 
    };
    await saveCourse(id, course);
    added++;
  }
  document.getElementById('import-msg').textContent = `✓ ${added} 堂課匯入成功，${skipped} 筆略過（重複或格式錯誤）`;
  document.getElementById('paste-area').value = '';
}

async function addSingle() {
  const date = toISO(document.getElementById('a-date').value);
  const className = document.getElementById('a-class').value.trim();
  if (!date || !className) return;
  if (courseList().find(c => c.date === date && c.className === className)) return;
  const id = uid();
  await saveCourse(id, {
    id, date, className,
    time: document.getElementById('a-time').value.trim(),
    classroom: document.getElementById('a-room').value.trim(),
    textbook: '',
    teacher: document.getElementById('a-teacher').value.trim(),
    lesson: '', materialLink: '', materialPage: '', imageUrls: [],
    createdAt: new Date().toISOString()
  });
  ['a-date','a-class','a-time','a-room','a-teacher'].forEach(id => { document.getElementById(id).value = ''; });
}

async function doDelete(id) {
  if (!confirm('確定刪除這堂課？')) return;
  await deleteCourse(id);
  renderCourseList();
}

async function deleteHistoryCourses() {
  const today = todayISO();
  const historyList = courseList().filter(c => c.date < today);
  if (!historyList.length) {
    alert('目前沒有比今天更早的歷史舊課程需要刪除。');
    return;
  }
  if (!confirm(`確定要一鍵刪除這 ${historyList.length} 堂歷史舊課嗎？\n(這項操作無法復原)`)) return;
  for (const c of historyList) {
    await set(ref(db, `courses/${c.id}`), null);
  }
  alert(`✓ 成功批量刪除 ${historyList.length} 堂歷史舊課程！`);
}

async function clearAllCourses() {
  const total = courseList().length;
  if (total === 0) {
    alert('目前資料庫內沒有任何課程紀錄。');
    return;
  }
  if (!confirm(`⚠️ 警報：這會直接「完全清空」資料庫裡所有的課程紀錄 (${total} 堂課)！\n你確定要繼續嗎？`)) return;
  if (!confirm('最後一次確認：你真的要清空嗎？所有外師辛苦填寫的教案截圖與紀錄都將徹底消失！')) return;
  await set(ref(db, 'courses'), null);
  alert('✓ 資料庫已全面重設，所有課程已清空。');
}
